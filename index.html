<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billing Calculator</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transitional">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkJpbGxpbmcgQ2FsY3VsYXRvciIsCiAgInNob3J0X25hbWUiOiAiQ2FsY3VsYXRvciIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFlMjkzYiIsCiAgInRoZW1lX2NvbG9yIjogIiM0ZjQ2ZTYiCiB9">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        button { touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen p-0 sm:p-4 select-none antialiased">

    <div class="bg-slate-900 w-full max-w-md h-screen sm:h-[90vh] sm:rounded-3xl overflow-hidden flex flex-col sm:border border-slate-800 shadow-2xl">
        
        <div class="flex border-b border-slate-800 bg-slate-950 shrink-0">
            <button id="calcTab" onclick="switchTab('calculator')" class="flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-indigo-500 bg-slate-900 text-white transition-all">
                🧮 Calculator
            </button>
            <button id="historyTab" onclick="switchTab('history')" class="flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all">
                📜 History (<span id="historyCount">0</span>)
            </button>
        </div>

        <div id="calculatorView" class="p-4 flex flex-col flex-1 justify-between overflow-hidden bg-slate-900">
            
            <div class="bg-black p-6 rounded-2xl mb-4 shadow-2xl border border-slate-800/80 flex flex-col justify-center min-h-[110px]">
                <div id="calcFormula" class="text-slate-500 text-sm font-mono text-right mb-1 h-5 overflow-x-auto no-scrollbar whitespace-nowrap"></div>
                <div id="calcDisplay" class="text-emerald-400 text-5xl font-mono font-medium text-right overflow-x-auto no-scrollbar whitespace-nowrap">0</div>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-1">Choose Payment Mode</label>
                <div class="flex gap-3">
                    <button id="modeCash" onclick="setPaymentMode('CASH')" class="flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-emerald-500 bg-emerald-950/40 text-emerald-400 shadow-md transition-all">
                        💵 CASH
                    </button>
                    <button id="modeOnline" onclick="setPaymentMode('ONLINE')" class="flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-transparent bg-slate-950 text-slate-500 shadow-sm transition-all">
                        💳 ONLINE
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2.5 mb-4 flex-1 items-stretch content-center">
                <button onclick="press('7')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">7</button>
                <button onclick="press('8')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">8</button>
                <button onclick="press('9')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">9</button>
                <button onclick="press('/')" class="bg-slate-950 text-amber-500 rounded-xl font-black text-2xl active:bg-slate-800 shadow-sm border border-slate-800">÷</button>

                <button onclick="press('4')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">4</button>
                <button onclick="press('5')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">5</button>
                <button onclick="press('6')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">6</button>
                <button onclick="press('*')" class="bg-slate-950 text-amber-500 rounded-xl font-black text-2xl active:bg-slate-800 shadow-sm border border-slate-800">×</button>

                <button onclick="press('1')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">1</button>
                <button onclick="press('2')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">2</button>
                <button onclick="press('3')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">3</button>
                <button onclick="press('-')" class="bg-slate-950 text-amber-500 rounded-xl font-black text-2xl active:bg-slate-800 shadow-sm border border-slate-800">-</button>

                <button onclick="press('0')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">0</button>
                <button onclick="press('.')" class="bg-slate-800 text-slate-100 rounded-xl font-bold text-2xl active:bg-slate-700 shadow-sm border border-slate-700/30">.</button>
                <button onclick="press('C')" class="bg-rose-950/50 text-rose-400 rounded-xl font-bold text-2xl active:bg-rose-900/60 shadow-sm border border-rose-900/40">C</button>
                <button onclick="press('+')" class="bg-slate-950 text-amber-500 rounded-xl font-black text-2xl active:bg-slate-800 shadow-sm border border-slate-800">+</button>
                
                <button onclick="press('=')" class="col-span-4 bg-indigo-600 text-white py-4 rounded-xl font-extrabold text-3xl active:bg-indigo-500 transition-all shadow-lg border border-indigo-500/40">=</button>
            </div>

            <button onclick="saveBill()" class="w-full bg-emerald-500 text-slate-950 py-4 rounded-xl font-black text-base tracking-wider shadow-xl active:bg-emerald-400 transition-all shrink-0">
                💾 SAVE BILL
            </button>
        </div>

        <div id="historyView" class="p-4 hidden flex-1 flex-col overflow-y-auto bg-slate-950">
            <div id="emptyState" class="text-center text-slate-500 mt-20 font-medium text-sm">No saved bills yet.</div>
            <div id="logList" class="space-y-3"></div>
        </div>

    </div>

    <script>
        let currentDisplay = '';
        let formulaHistoryStr = '';
        let selectedMode = 'CASH';
        let logs = JSON.parse(localStorage.getItem('billing_logs')) || [];

        updateHistoryUI();

        function press(val) {
            const displayEl = document.getElementById('calcDisplay');
            const formulaEl = document.getElementById('calcFormula');
            
            if (val === 'C') {
                currentDisplay = '';
                formulaHistoryStr = '';
                displayEl.innerText = '0';
                formulaEl.innerText = '';
            } else if (val === '=') {
                try {
                    if (!currentDisplay) return;
                    formulaHistoryStr = currentDisplay.replace(/\*/g, '×').replace(/\//g, '÷');
                    formulaEl.innerText = formulaHistoryStr + ' =';
                    
                    let result = new Function(`return ${currentDisplay}`)();
                    currentDisplay = String(Number(result).toFixed(2));
                    displayEl.innerText = currentDisplay;
                } catch {
                    alert('Calculation error');
                    formulaHistoryStr = '';
                    formulaEl.innerText = '';
                }
            } else {
                if (currentDisplay && !isNaN(val) && formulaHistoryStr !== '' && currentDisplay === displayEl.innerText) {
                    currentDisplay = '';
                    formulaHistoryStr = '';
                    formulaEl.innerText = '';
                }
                currentDisplay += val;
                displayEl.innerText = currentDisplay.replace(/\*/g, '×').replace(/\//g, '÷');
            }
        }

        function setPaymentMode(mode) {
            selectedMode = mode;
            const cashBtn = document.getElementById('modeCash');
            const onlineBtn = document.getElementById('modeOnline');
            
            if (mode === 'CASH') {
                cashBtn.className = "flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-emerald-500 bg-emerald-950/40 text-emerald-400 shadow-md transition-all";
                onlineBtn.className = "flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-transparent bg-slate-950 text-slate-500 shadow-sm transition-all";
            } else {
                cashBtn.className = "flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-transparent bg-slate-950 text-slate-500 shadow-sm transition-all";
                onlineBtn.className = "flex-1 py-3.5 text-xs font-bold tracking-wider rounded-xl border-2 border-indigo-500 bg-indigo-950/40 text-indigo-400 shadow-md transition-all";
            }
        }

        function saveBill() {
            const amount = parseFloat(currentDisplay);
            if (isNaN(amount) || amount <= 0) {
                alert('Please calculate a value first.');
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
            const calculationFormula = formulaHistoryStr || `${amount}`;

            const newLog = { amount, formula: calculationFormula, mode: selectedMode, date: dateStr, time: timeStr };
            logs.unshift(newLog);
            localStorage.setItem('billing_logs', JSON.stringify(logs));
            
            alert(`Saved: ₹${amount.toFixed(2)} via ${selectedMode}`);
            
            currentDisplay = '';
            formulaHistoryStr = '';
            document.getElementById('calcDisplay').innerText = '0';
            document.getElementById('calcFormula').innerText = '';
            
            updateHistoryUI();
        }

        function updateHistoryUI() {
            document.getElementById('historyCount').innerText = logs.length;
            const listEl = document.getElementById('logList');
            const emptyEl = document.getElementById('emptyState');
            
            if (logs.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }
            
            emptyEl.classList.add('hidden');
            listEl.innerHTML = logs.map(log => `
                <div class="bg-slate-900 border border-slate-800/60 rounded-xl p-4 flex justify-between items-center shadow-md">
                    <div>
                        <div class="text-2xl font-mono font-bold ${log.mode === 'CASH' ? 'text-emerald-400' : 'text-indigo-400'}">₹${Number(log.amount).toFixed(2)}</div>
                        <div class="text-xs text-slate-400 font-mono mt-1 bg-black/40 px-2 py-0.5 rounded border border-slate-800/50 inline-block">🧮 ${log.formula || log.amount}</div>
                        <div class="text-[10px] text-slate-500 font-bold tracking-wider mt-1.5 uppercase block">${log.mode}</div>
                    </div>
                    <div class="text-right flex flex-col justify-between self-stretch">
                        <div class="text-xs font-bold text-slate-300 font-mono">${log.date}</div>
                        <div class="text-[11px] text-slate-500 font-mono">${log.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            const calcTab = document.getElementById('calcTab');
            const histTab = document.getElementById('historyTab');
            const calcView = document.getElementById('calculatorView');
            const histView = document.getElementById('historyView');

            if (tab === 'calculator') {
                calcTab.className = "flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-indigo-500 bg-slate-900 text-white transition-all";
                histTab.className = "flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
                calcView.classList.remove('hidden');
                histView.classList.add('hidden');
            } else {
                histTab.className = "flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-indigo-500 bg-slate-900 text-white transition-all";
                calcTab.className = "flex-1 py-4 text-center font-bold text-sm tracking-wide uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
                calcView.classList.add('hidden');
                histView.classList.remove('hidden');
                histView.classList.add('flex');
            }
        }
        
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('fetch', function(e){});";
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
