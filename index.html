<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billing Calculator</title>
    
    <!-- PWA Requirements for App Installation -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transitional">
    <meta name="apple-mobile-web-app-title" content="Billing Calc">
    
    <!-- Inlines a Web Manifest dynamically so it is installable as a mobile app on GitHub Pages -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkJpbGxpbmcgQ2FsY3VsYXRvciIsCiAgInNob3J0X25hbWUiOiAiQmlsbGluZ0NhbGMiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2YzZjRmNiIsCiAgInRoZW1lX2NvbG9yIjogIiM0ZjQ2ZTYiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yMzMxLzIzMzE5NDAucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

    <!-- Tailwind CSS Engine for Clean Mobile UI Layouts -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Disables annoying double-tap zooming on standard mobile keys */
        button { touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-0 sm:p-4 select-none">

    <!-- App Container -->
    <div class="bg-white shadow-xl w-full max-w-md h-screen sm:h-[90vh] sm:rounded-2xl overflow-hidden flex flex-col">
        
        <!-- Navigation Header Switcher -->
        <div class="flex border-b border-gray-200 bg-gray-50 shrink-0">
            <button id="calcTab" onclick="switchTab('calculator')" class="flex-1 py-4 text-center font-bold border-b-2 border-indigo-600 bg-white text-indigo-600 transition-all duration-150">
                🧮 Calculator
            </button>
            <button id="historyTab" onclick="switchTab('history')" class="flex-1 py-4 text-center font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-all duration-150">
                📜 Logs (<span id="historyCount">0</span>)
            </button>
        </div>

        <!-- TAB 1: CALCULATOR WORKSPACE -->
        <div id="calculatorView" class="p-4 flex flex-col flex-1 justify-between overflow-hidden">
            <!-- Digital Readout Screen -->
            <div class="bg-gray-900 p-6 rounded-xl text-right mb-3 shadow-inner">
                <div id="calcDisplay" class="text-emerald-400 text-4xl font-mono tracking-wider overflow-x-auto whitespace-nowrap scrollbar-none">0</div>
            </div>

            <!-- Active Mode Selector -->
            <div class="mb-3">
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Payment Method</label>
                <div class="flex gap-3">
                    <button id="modeCash" onclick="setPaymentMode('CASH')" class="flex-1 py-3 font-bold rounded-xl border-2 border-green-600 bg-green-50 text-green-700 transition-all duration-150">
                        💵 CASH
                    </button>
                    <button id="modeOnline" onclick="setPaymentMode('ONLINE')" class="flex-1 py-3 font-bold rounded-xl border-2 border-transparent bg-gray-100 text-gray-600 transition-all duration-150">
                        💳 ONLINE
                    </button>
                </div>
            </div>

            <!-- Layout Mechanical Keypad -->
            <div class="grid grid-cols-4 gap-2 mb-4 flex-1 items-stretch content-center">
                <button onclick="press('7')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">7</button>
                <button onclick="press('8')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">8</button>
                <button onclick="press('9')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">9</button>
                <button onclick="press('/')" class="bg-orange-100 text-orange-700 rounded-xl font-bold text-xl active:bg-orange-200">/</button>

                <button onclick="press('4')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">4</button>
                <button onclick="press('5')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">5</button>
                <button onclick="press('6')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">6</button>
                <button onclick="press('*')" class="bg-orange-100 text-orange-700 rounded-xl font-bold text-xl active:bg-orange-200">*</button>

                <button onclick="press('1')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">1</button>
                <button onclick="press('2')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">2</button>
                <button onclick="press('3')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">3</button>
                <button onclick="press('-')" class="bg-orange-100 text-orange-700 rounded-xl font-bold text-xl active:bg-orange-200">-</button>

                <button onclick="press('0')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">0</button>
                <button onclick="press('.')" class="bg-gray-100 rounded-xl font-bold text-xl active:bg-gray-300 transition-colors">.</button>
                <button onclick="press('C')" class="bg-red-100 text-red-600 rounded-xl font-bold text-xl active:bg-red-200">C</button>
                <button onclick="press('+')" class="bg-orange-100 text-orange-700 rounded-xl font-bold text-xl active:bg-orange-200">+</button>
                
                <button onclick="press('=')" class="col-span-4 bg-indigo-600 text-white py-3 rounded-xl font-bold text-2xl active:bg-indigo-700 transition-colors shadow-sm">=</button>
            </div>

            <!-- Finalize Storage Execution -->
            <button onclick="saveBill()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-md active:bg-emerald-700 transition-all shrink-0">
                💾 SAVE BILL LOG
            </button>
        </div>

        <!-- TAB 2: HISTORICAL ACCOUNTING LOGS -->
        <div id="historyView" class="p-4 hidden flex-1 flex-col overflow-y-auto bg-gray-50">
            <div id="emptyState" class="text-center text-gray-400 mt-16 font-medium">No sales transactions logged yet.</div>
            <div id="logList" class="space-y-2.5"></div>
        </div>

    </div>

    <!-- Script Architecture Core -->
    <script>
        let currentDisplay = '';
        let selectedMode = 'CASH';
        let logs = JSON.parse(localStorage.getItem('billing_logs')) || [];

        // Setup baseline numbers on initial compile
        updateHistoryUI();

        function press(val) {
            const displayEl = document.getElementById('calcDisplay');
            if (val === 'C') {
                currentDisplay = '';
                displayEl.innerText = '0';
            } else if (val === '=') {
                try {
                    if (!currentDisplay) return;
                    let result = new Function(`return ${currentDisplay}`)();
                    currentDisplay = String(Number(result).toFixed(2));
                    displayEl.innerText = currentDisplay;
                } catch {
                    alert('Invalid math pattern.');
                }
            } else {
                currentDisplay += val;
                displayEl.innerText = currentDisplay;
            }
        }

        function setPaymentMode(mode) {
            selectedMode = mode;
            const cashBtn = document.getElementById('modeCash');
            const onlineBtn = document.getElementById('modeOnline');
            
            if (mode === 'CASH') {
                cashBtn.className = "flex-1 py-3 font-bold rounded-xl border-2 border-green-600 bg-green-50 text-green-700 transition-all duration-150";
                onlineBtn.className = "flex-1 py-3 font-bold rounded-xl border-2 border-transparent bg-gray-100 text-gray-500 transition-all duration-150";
            } else {
                cashBtn.className = "flex-1 py-3 font-bold rounded-xl border-2 border-transparent bg-gray-100 text-gray-500 transition-all duration-150";
                onlineBtn.className = "flex-1 py-3 font-bold rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 transition-all duration-150";
            }
        }

        function saveBill() {
            const amount = parseFloat(currentDisplay);
            if (isNaN(amount) || amount <= 0) {
                alert('Please run an operation calculation before clicking Save.');
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

            const newLog = { amount, mode: selectedMode, date: dateStr, time: timeStr };
            logs.unshift(newLog);
            
            // Saves data directly inside the persistent local storage subsystem of the device
            localStorage.setItem('billing_logs', JSON.stringify(logs));
            
            alert(`Logged: ₹${amount.toFixed(2)} [${selectedMode}] successfully.`);
            press('C');
            updateHistoryUI();
        }

        function updateHistoryUI() {
            document.getElementById('historyCount').innerText = logs.length;
            const listEl = document.getElementById('logList');
            const emptyEl = document.getElementById('emptyState');
            
            if (logs.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }
            
            emptyEl.classList.add('hidden');
            listEl.innerHTML = logs.map(log => `
                <div class="bg-white border border-gray-100 rounded-xl p-4 flex justify-between items-center shadow-xs">
                    <div>
                        <div class="text-xl font-black ${log.mode === 'CASH' ? 'text-green-600' : 'text-indigo-600'}">₹${Number(log.amount).toFixed(2)}</div>
                        <div class="text-[10px] text-gray-400 font-bold tracking-wider mt-0.5 uppercase">${log.mode}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-semibold text-gray-700">${log.date}</div>
                        <div class="text-xs text-gray-400 mt-0.5">${log.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            const calcTab = document.getElementById('calcTab');
            const histTab = document.getElementById('historyTab');
            const calcView = document.getElementById('calculatorView');
            const histView = document.getElementById('historyView');

            if (tab === 'calculator') {
                calcTab.className = "flex-1 py-4 text-center font-bold border-b-2 border-indigo-600 bg-white text-indigo-600";
                histTab.className = "flex-1 py-4 text-center font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700";
                calcView.classList.remove('hidden');
                histView.classList.add('hidden');
            } else {
                histTab.className = "flex-1 py-4 text-center font-bold border-b-2 border-indigo-600 bg-white text-indigo-600";
                calcTab.className = "flex-1 py-4 text-center font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700";
                calcView.classList.add('hidden');
                histView.classList.remove('hidden');
                histView.classList.add('flex');
            }
        }
        
        // Setup mock service worker file dynamically to pass PWA criteria
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('fetch', function(e){});";
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
